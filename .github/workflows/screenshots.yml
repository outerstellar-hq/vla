name: Screenshots

on:
  push:
    branches:
      - main
    paths:
      - 'internal/tui/**'
      - 'demo.go'
      - 'scripts/ansi-to-png.sh'
      - '.github/workflows/screenshots.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  screenshots:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build VLA
        run: go build -o vla .

      - name: Install conversion tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq aha wkhtmltopdf

      - name: Generate ANSI scenes
        run: ./vla demo --out=assets/

      - name: Convert ANSI to PNG
        run: |
          chmod +x scripts/ansi-to-png.sh
          bash scripts/ansi-to-png.sh assets/demo-conversation.ansi assets/demo-diff.ansi assets/demo-sessions.ansi

      - name: Clean up ANSI files
        run: rm -f assets/demo-*.ansi

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet && git diff --cached --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit screenshots
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/demo-*.png
          git commit -m "screenshots: auto-generate TUI screenshots

          Generated by .github/workflows/screenshots.yml from current TUI code.
          Scenes: conversation, diff pane, session picker."
          git push
