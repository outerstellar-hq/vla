name: Screenshots

on:
  push:
    branches:
      - main
    paths:
      - 'internal/tui/**'
      - 'demo.go'
      - 'assets/overview.html'
      - 'scripts/ansi-to-png.sh'
      - 'scripts/frames-to-gif.sh'
      - '.github/workflows/screenshots.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  screenshots:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build VLA
        run: go build -o vla .

      - name: Install conversion tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq aha wkhtmltopdf optipng imagemagick gifsicle

      - name: Generate ANSI scenes
        run: ./vla demo --out=assets/

      - name: Convert ANSI to PNG
        run: |
          chmod +x scripts/ansi-to-png.sh
          bash scripts/ansi-to-png.sh assets/demo-conversation.ansi assets/demo-diff.ansi assets/demo-sessions.ansi

      - name: Generate animated GIF
        run: |
          chmod +x scripts/frames-to-gif.sh
          ./vla demo --gif --out=assets/
          bash scripts/frames-to-gif.sh assets/frames assets/demo.gif 500

      - name: Render overview image
        run: |
          wkhtmltoimage --quiet \
            --quality 85 \
            --width 1200 \
            --height 0 \
            --enable-local-file-access \
            assets/overview.html assets/overview.png

      - name: Clean up intermediate files
        run: |
          rm -f assets/demo-*.ansi
          rm -rf assets/frames

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet && git diff --cached --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit screenshots
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/demo-*.png assets/demo.gif assets/overview.png
          git commit -m "screenshots: auto-generate TUI screenshots

          Generated by .github/workflows/screenshots.yml from current TUI code.
          Scenes: conversation, diff pane, session picker."
          git push
